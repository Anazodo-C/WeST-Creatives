name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Every integration in this app has a demo-mode fallback, so CI
          # builds cleanly with no secrets configured. Add repo secrets of
          # the same names (Settings -> Secrets and variables -> Actions)
          # once you want CI to build against real keys.
          CIRCLE_API_KEY: ${{ secrets.CIRCLE_API_KEY }}
          CIRCLE_ENTITY_SECRET: ${{ secrets.CIRCLE_ENTITY_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          # Falls back to a real (if unused) URL when the secret isn't set.
          # Referencing an unconfigured secret via ${{ secrets.X }} sets the
          # env var to an EMPTY STRING, not "undefined" - and next-auth's
          # own parseUrl() does `url ?? defaultUrl` internally, which only
          # falls back on null/undefined, not on "". An empty NEXTAUTH_URL
          # therefore hits `new URL("")` at module-load time (inside
          # next-auth/react, imported by every page via the root layout)
          # and crashes `next build` with "TypeError: Invalid URL" while
          # prerendering _not-found - this is what was actually breaking CI.
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
